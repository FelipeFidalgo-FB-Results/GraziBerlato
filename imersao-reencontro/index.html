/* ───────────────────────────────────────────────────────────
   Imersão Re-Encontro — soft, ethereal, editorial
   Palette is driven by CSS variables on :root (set via Tweaks)
─────────────────────────────────────────────────────────── */

:root {
  /* Defaults — overridden by Tweaks */
  --wine: #5b1a2e;
  --wine-deep: #3f0f1f;
  --forest: #1f3a2e;
  --forest-deep: #142b22;
  --cream: #f6efe4;
  --cream-soft: #fbf6ec;
  --sand: #e8ddc8;
  --bone: #ffffff;
  --ink: #1a1815;
  --ink-soft: #4a463e;
  --terracotta: #c45a2b;
  --gold: #b88a3e;

  --font-display: "Playfair Display", "Cormorant Garamond", Georgia, serif;
  --font-body: "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --r-pill: 999px;
  --r-card: 18px;
  --r-soft: 6px;

  --shadow-soft: 0 8px 28px rgba(31, 26, 18, 0.08);
  --shadow-deep: 0 20px 60px rgba(31, 26, 18, 0.18);

  --max: 1180px;
  --gutter: clamp(20px, 4vw, 56px);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--cream-soft);
  font-size: 17px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
  text-rendering: optimizeLegibility;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* Display type — delicate, airy */
.display {
  font-family: var(--font-display);
  font-weight: 400;
  letter-spacing: -0.012em;
  line-height: 1.04;
  text-wrap: balance;
}
.display em {
  font-style: italic;
  font-weight: 400;
}
.eyebrow {
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  font-weight: 500;
}
.lede { font-size: 1.075rem; line-height: 1.65; max-width: 56ch; text-wrap: pretty; color: var(--ink-soft); }

/* Container */
.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--gutter); }
section { position: relative; }

/* CTA — pill, soft, slightly imperfect */
.cta {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 18px 32px;
  border: none;
  border-radius: var(--r-pill);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cream-soft);
  background: var(--forest);
  transition: transform .35s cubic-bezier(.2,.7,.2,1),
              background .25s ease, box-shadow .35s ease;
  box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 8px 24px rgba(20, 43, 34, .25);
  white-space: nowrap;
}
.cta:hover { transform: translateY(-2px); background: var(--forest-deep); box-shadow: 0 14px 32px rgba(20, 43, 34, .35); }
.cta:active { transform: translateY(0); }
.cta .arrow {
  display: inline-block; width: 10px; height: 10px;
  border-right: 1.5px solid currentColor;
  border-top: 1.5px solid currentColor;
  transform: rotate(45deg);
  transition: transform .35s cubic-bezier(.2,.7,.2,1);
}
.cta:hover .arrow { transform: rotate(45deg) translate(2px, -2px); }

.cta-light { background: var(--cream-soft); color: var(--forest-deep); box-shadow: 0 6px 22px rgba(0,0,0,.18); }
.cta-light:hover { background: var(--bone); }

.cta-wine { background: var(--wine); }
.cta-wine:hover { background: var(--wine-deep); }

/* ─── HERO ─── */
.hero {
  position: relative;
  min-height: 100vh;
  min-height: 100svh;
  display: grid;
  align-items: end;
  isolation: isolate;
  overflow: hidden;

}
.hero-bg {
  position: absolute; inset: 0; z-index: -2;

}
.hero-bg img {
  width: 100%; height: 100%; object-fit: cover;

}
.hero-bg::after {
  content: "";

  background:
    linear-gradient(95deg, rgba(10, 18, 14, .68) 0%, rgba(10, 18, 14, .35) 42%, rgba(10, 18, 14, 0) 70%),
    linear-gradient(180deg, rgba(10, 18, 14, .25) 0%, rgba(10, 18, 14, 0) 35%, rgba(10, 18, 14, .55) 100%);
}

.hero-nav {
  position: absolute; top: 0; left: 0; right: 0; z-index: 2;

}
.hero-nav .brand {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 22px;
  letter-spacing: -0.01em;
  text-transform: none;
}
.hero-nav .handle {
  font-family: var(--font-body);
  font-weight: 400;
  letter-spacing: 0.08em;
  opacity: 0.85;
  font-size: 12.5px;
}
.hero-nav .check {
  display: inline-block; width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  margin-left: 6px;
  position: relative;
  vertical-align: -2px;
}
.hero-nav .check::after {
  content: ""; position: absolute; left: 4px; top: 3px;
  width: 4px; height: 7px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: rotate(45deg);
}

.hero-content {
  position: relative; z-index: 1;
  padding: 0 var(--gutter) clamp(56px, 10vh, 120px);
  max-width: var(--max);
  margin: 0 auto;
  width: 100%;
}
.hero-eyebrow { color: rgba(255,255,255,.78); margin-bottom: 22px; }
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 6.4vw, 5.4rem);
  font-weight: 400;
  letter-spacing: -0.018em;
  line-height: 1.02;
  margin: 0 0 22px;
  max-width: 14ch;
}
.hero h1 .accent {
  font-style: italic;
  color: var(--cream);
  display: block;
  font-weight: 400;
}
.hero p.lede { color: rgba(255,255,255,.85); max-width: 44ch; margin-bottom: 36px; }
.hero-meta {
  display: flex; flex-wrap: wrap; gap: 20px 28px;
  margin-top: 30px;
  font-size: 13px;
  color: rgba(255,255,255,.85);

}
.hero-meta .item { display: inline-flex; align-items: center; gap: 10px; }

.scroll-indicator {
  position: absolute; bottom: 28px; right: var(--gutter); z-index: 1;
  font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;

}
.scroll-indicator .line {
  display: inline-block; width: 40px; height: 1px; background: rgba(255,255,255,.5);
  position: relative; overflow: hidden;
}
.scroll-indicator .line::after {
  content: ""; position: absolute; left: -40px; top: 0; width: 40px; height: 1px;
  background: rgba(255,255,255,1);
  animation: scrollLine 2.4s ease-in-out infinite;
}
@keyframes scrollLine {
  0% { left: -40px; } 60% { left: 40px; } 100% { left: 40px; }
}

/* ─── Sticky CTA ─── */
.sticky-cta {
  position: fixed; bottom: 22px; left: 50%; transform: translate(-50%, 120px);
  z-index: 90;
  transition: transform .5s cubic-bezier(.2,.7,.2,1);
}
.sticky-cta.visible { transform: translate(-50%, 0); }

/* ─── Section: identification (wine) ─── */
.s-id {
  background: var(--wine);
  color: var(--cream-soft);
  padding: clamp(80px, 12vh, 140px) 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.s-id::before, .s-id::after {
  content: ""; position: absolute;

}

.s-id .container { max-width: 760px; }
.s-id h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4.6vw, 3.4rem);

}

}

/* ─── Section: para quem é (forest) ─── */
.s-for {
  background: var(--forest-deep);
  color: var(--cream-soft);
  padding: clamp(90px, 14vh, 150px) 0;
  position: relative;
  overflow: hidden;
}
.s-for::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 80% 20%, rgba(184, 138, 62, .14), transparent 60%),
    radial-gradient(ellipse 70% 50% at 10% 90%, rgba(246, 239, 228, .06), transparent 60%);
  pointer-events: none;
}
.s-for .container { position: relative; }
.s-for-grid {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: clamp(40px, 6vw, 90px);
  align-items: start;
}
.s-for h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4.4vw, 3.2rem);

}

.s-for-list .num {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--gold);
  font-feature-settings: "lnum";
}
.s-for-cta { margin-top: 48px; }

/* ─── Section: vivência (white) ─── */
.s-live {
  background: var(--cream-soft);
  padding: clamp(90px, 14vh, 150px) 0;
}
.s-live-grid {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: clamp(40px, 6vw, 90px);
  align-items: center;
}
.s-live h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4.4vw, 3.2rem);
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -0.01em;
  margin: 16px 0 24px;
}
.s-live h2 em { font-style: italic; color: var(--wine); }
.s-live .sub { color: var(--ink-soft); margin-bottom: 32px; max-width: 50ch; }
.s-live-list { list-style: none; padding: 0; margin: 0 0 36px; display: grid; gap: 0; }
.s-live-list li {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 18px;
  align-items: start;
  padding: 18px 0;
  border-top: 1px solid rgba(26, 24, 21, .1);
  font-size: 1.02rem;
  line-height: 1.45;
}
.s-live-list li:last-child { border-bottom: 1px solid rgba(26, 24, 21, .1); }
.s-live-list .mark {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1px solid var(--forest);
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 1px;
  flex-shrink: 0;
}
.s-live-list .mark::after {
  content: ""; width: 8px; height: 4px;
  border-left: 1.5px solid var(--forest);
  border-bottom: 1.5px solid var(--forest);
  transform: rotate(-45deg) translate(0, -1px);
}
.s-live-photo {
  position: relative;
  border-radius: var(--r-card);
  overflow: hidden;
  aspect-ratio: 4/5;
  box-shadow: var(--shadow-deep);
}
.s-live-photo img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 8s ease;
}
.s-live-photo:hover img { transform: scale(1.04); }
.s-live-photo .cap {
  position: absolute; left: 18px; bottom: 18px;
  font-family: var(--font-display);
  font-style: italic;
  color: var(--cream-soft);
  font-size: 14px;
  letter-spacing: 0.02em;
  text-shadow: 0 1px 8px rgba(0,0,0,.4);
}

/* ─── Testimonials ─── */
.s-testi {
  background: var(--forest);
  color: var(--cream-soft);
  padding: clamp(90px, 14vh, 150px) 0;
  overflow: hidden;
  position: relative;
}
.s-testi::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(184, 138, 62, .12), transparent 60%);
}
.s-testi .container { position: relative; }
.s-testi-head {
  text-align: center; margin-bottom: 60px;
}
.s-testi-head h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4.4vw, 3.2rem);
  font-weight: 400;
  font-style: italic;
  line-height: 1.05;
  margin: 16px 0 0;
  letter-spacing: -0.01em;
}
.testi-stage-img {
  position: relative;
  max-width: 320px;
  margin: 0 auto;
  height: 340px;
}
.testi-img-card {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px;

}
.testi-img-card.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
.testi-img-frame {
  background: var(--cream-soft);

  padding: 18px 16px 16px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.5) inset,

  justify-content: center;
  position: relative;
  width: fit-content;
  max-width: 100%;
  max-height: 100%;
}
.testi-img-frame::before {
  content: "";
  position: absolute; top: 7px; left: 50%; transform: translateX(-50%);
  width: 38px; height: 3px; border-radius: 2px;
  background: rgba(20, 43, 34, .14);
}
.testi-img-frame img {
  display: block;
  max-width: 100%;
  max-height: 290px;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 4px;
}
.testi-stage {
  position: relative;
  max-width: 820px;
  margin: 0 auto;
  min-height: 320px;
}

  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;

.s-testi-cta { text-align: center; margin-top: 56px; }

/* ─── Espaço (gallery) ─── */
.s-space {
  background: var(--cream-soft);
  padding: clamp(90px, 14vh, 150px) 0;
}
.s-space-head {
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(20px, 3vw, 32px);
  margin-bottom: 56px;
  text-align: center;
}
.s-space-head > div { text-align: center; }
.s-space-head .eyebrow { display: block; }
.s-space-head h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4.4vw, 3.2rem);
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -0.01em;
  margin: 16px 0 0;
}
.s-space-head h2 em { font-style: italic; color: var(--forest); }
.s-space-head p { color: var(--ink-soft); max-width: 52ch; margin: 0 auto; text-wrap: pretty; }
.gallery {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 130px;
  gap: 14px;
}
.gallery-item {
  border-radius: var(--r-card);
  overflow: hidden;
  position: relative;
  background: var(--sand);
}
.gallery-item.tall { grid-row: span 2; }
.gallery-item.wide { grid-column: span 2; }
.gallery-item.lg { grid-column: span 3; grid-row: span 2; }
.gallery-item.md { grid-column: span 2; grid-row: span 2; }
.gallery-item.sm { grid-column: span 1; grid-row: span 1; }
.gallery-placeholder {
  width: 100%; height: 100%;
  background:
    repeating-linear-gradient(
      135deg,
      rgba(95, 70, 40, .07),
      rgba(95, 70, 40, .07) 12px,
      rgba(95, 70, 40, .03) 12px,
      rgba(95, 70, 40, .03) 24px

    linear-gradient(135deg, var(--sand), var(--cream));
  display: flex; align-items: center; justify-content: center;
  color: rgba(31, 58, 46, .55);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-align: center;
  padding: 16px;
  text-wrap: balance;
}
.gallery-item .gallery-tag {
  position: absolute; left: 14px; bottom: 14px;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 13px;
  color: var(--forest-deep);
  background: rgba(246, 239, 228, .85);
  padding: 4px 10px; border-radius: var(--r-pill);
}

/* ─── Espaço · Carrossel ─── */
.space-carousel {
  position: relative;
  border-radius: var(--r-card);
  overflow: hidden;
  background: var(--sand);
  box-shadow: var(--shadow-deep);
  isolation: isolate;
}
.space-stage {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  max-height: 560px;
}
.space-slide {
  position: absolute; inset: 0;
  opacity: 0;
  transform: scale(1.02);
  transition: opacity 1s ease, transform 2.6s ease;
  pointer-events: none;
}
.space-slide.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}
.space-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.space-slide::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,.45) 100%);
  pointer-events: none;
}
.space-tag {
  position: absolute;
  left: 22px;
  bottom: 22px;
  z-index: 2;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 14px;
  color: var(--cream-soft);
  background: rgba(20, 43, 34, .55);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  padding: 6px 14px;
  border-radius: var(--r-pill);
  letter-spacing: 0.01em;
}
.space-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, .35);
  background: rgba(20, 43, 34, .35);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  color: var(--cream-soft);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .25s ease, border-color .25s ease, transform .25s ease;
}
.space-arrow:hover { background: rgba(20, 43, 34, .6); border-color: rgba(255,255,255,.7); }
.space-arrow:active { transform: translateY(-50%) scale(.96); }
.space-arrow svg { width: 18px; height: 18px; }
.space-arrow-prev { left: 18px; }
.space-arrow-next { right: 18px; }
.space-dots {
  position: absolute;
  left: 50%;
  bottom: 22px;
  transform: translateX(-50%);
  z-index: 2;
  display: flex; gap: 8px;
}
.space-dot {
  appearance: none; border: none; padding: 0;
  width: 22px; height: 2px;
  background: rgba(246, 239, 228, .45);
  border-radius: 1px;
  transition: background .3s ease, width .3s ease;
}
.space-dot.active { background: var(--cream-soft); width: 34px; }
.space-counter {
  position: absolute;
  right: 22px;
  bottom: 22px;
  z-index: 2;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: rgba(246, 239, 228, .8);
  font-feature-settings: "tnum";
}

/* ─── Sobre Grazi (cream) ─── */
.s-about {
  background: var(--cream);
  padding: clamp(90px, 14vh, 150px) 0;
  position: relative;
  overflow: hidden;
}
.s-about-grid {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: clamp(40px, 6vw, 90px);
  align-items: center;
}
.s-about-photo {
  position: relative;
  border-radius: var(--r-card);
  overflow: hidden;
  aspect-ratio: 4/5;
  box-shadow: var(--shadow-deep);
}
.s-about-photo img { width: 100%; height: 100%; object-fit: cover; }
.s-about-photo .badge {
  position: absolute; top: 18px; left: 18px;
  background: rgba(246, 239, 228, .85);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  padding: 6px 14px;
  border-radius: var(--r-pill);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--wine);
  font-weight: 500;
}
.s-about h2 {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 5vw, 3.8rem);
  font-weight: 400;
  line-height: 1;
  margin: 14px 0 6px;
  letter-spacing: -0.015em;
}
.s-about h2 em { font-style: italic; color: var(--wine); }
.s-about .role {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--ink-soft);
  margin: 0 0 28px;
  font-weight: 400;
}
.s-about p { color: var(--ink-soft); max-width: 56ch; margin: 0 0 18px; text-wrap: pretty; }
.s-about-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 24px; margin-top: 38px;
  padding-top: 32px;
  border-top: 1px solid rgba(26, 24, 21, .12);
}
.s-about-stats .stat .num {
  font-family: var(--font-display);
  font-size: 2.4rem;
  line-height: 1;
  color: var(--wine);
  font-feature-settings: "lnum";
}
.s-about-stats .stat .lbl {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-soft); margin-top: 6px;
}

/* ─── Inscrição ─── */
.s-signup { background: var(--cream-soft); padding: clamp(90px, 14vh, 150px) 0; }
.s-signup-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: clamp(30px, 4vw, 56px);
  align-items: stretch;
}
.signup-steps {
  background: var(--bone);
  padding: clamp(36px, 5vw, 56px);
  border-radius: var(--r-card);
  border: 1px solid rgba(26, 24, 21, .08);
}
.signup-steps h2 {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 3.4vw, 2.4rem);
  font-weight: 400;
  line-height: 1.08;
  margin: 14px 0 30px;
  letter-spacing: -0.01em;
}
.signup-steps h2 em { font-style: italic; color: var(--wine); }

/* Centered WhatsApp CTA block (replaces form + numbered steps) */
.signup-cta-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0;
}
.signup-cta-block h2 { margin: 14px 0 18px; }
.signup-cta-block h2 em {
  position: relative;
  background: linear-gradient(transparent 62%, rgba(91, 26, 46, 0.18) 62%, rgba(91, 26, 46, 0.18) 92%, transparent 92%);
  padding: 0 4px;
}
.signup-cta-block .signup-sub {
  color: var(--ink-soft);
  max-width: 36ch;
  margin: 0 auto 32px;
  font-size: 1.05rem;
  line-height: 1.55;
  text-wrap: pretty;
}
.cta-whatsapp .wa-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-right: 2px;
}
.cta-whatsapp .wa-icon svg { display: block; }
.steps { list-style: none; padding: 0; margin: 0 0 30px; display: grid; gap: 16px; }
.steps li { display: grid; grid-template-columns: 36px 1fr; gap: 14px; align-items: start; }
.steps .step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--wine); color: var(--cream-soft);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-style: italic; font-size: 14px;
  margin-top: 1px;
}
.steps .step-text {
  font-size: 0.96rem; line-height: 1.5; color: var(--ink-soft);
}
.steps .step-text strong { color: var(--ink); font-weight: 600; }

.form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-row label {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 500;
}
.form-row input {
  appearance: none;
  border: none;
  border-bottom: 1px solid rgba(26, 24, 21, .25);
  background: transparent;
  font: inherit; font-size: 1rem;
  padding: 10px 0;
  color: var(--ink);
  outline: none;
  border-radius: 0;
  transition: border-color .25s ease;
  font-family: var(--font-body);
}
.form-row input:focus { border-bottom-color: var(--wine); }
.form-row input::placeholder { color: rgba(26, 24, 21, .35); }
.form-row.error input { border-bottom-color: #c45a2b; }
.form-error {
  font-size: 11px; color: #c45a2b; margin-top: 4px;
  letter-spacing: 0.04em;
}
.form-submit { margin-top: 22px; width: 100%; justify-content: center; }
.form-success {
  background: rgba(31, 58, 46, .06);
  border: 1px solid rgba(31, 58, 46, .2);
  padding: 20px;
  border-radius: var(--r-card);
  margin-top: 20px;
  display: flex; gap: 14px; align-items: flex-start;
}
.form-success .ok-icon {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--forest); color: var(--cream-soft);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.form-success .ok-icon::after {
  content: ""; width: 9px; height: 5px;
  border-left: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor;
  transform: rotate(-45deg) translate(0, -1px);
}
.form-success p { margin: 0; font-size: 0.92rem; color: var(--ink-soft); line-height: 1.5; }
.form-success strong { color: var(--ink); font-weight: 600; display: block; margin-bottom: 4px; }

.invest {
  background: var(--forest-deep);
  color: var(--cream-soft);
  padding: clamp(36px, 5vw, 56px);
  border-radius: var(--r-card);
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}
.invest::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 70% 0%, rgba(184, 138, 62, .18), transparent 60%);
  pointer-events: none;
}
.invest > * { position: relative; }
.invest h2 {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 3.4vw, 2.4rem);
  font-weight: 400; line-height: 1.08;
  margin: 14px 0 30px;
  letter-spacing: -0.01em;
}
.invest h2 em { font-style: italic; color: var(--gold); }
.invest-h2 { font-size: clamp(1.8rem, 3vw, 2.2rem); }
.price-grid { margin: auto 0; }
.price-installment {
  display: flex; align-items: baseline; gap: 12px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(246, 239, 228, .15);
  margin-bottom: 20px;
}
.price-installment .lbl {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(246, 239, 228, .7);
}
.price-installment .num {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 4.4vw, 3.4rem);
  line-height: 1;
  color: var(--cream-soft);
  font-feature-settings: "lnum";
  letter-spacing: -0.01em;
}
.price-installment .num small { font-size: 0.5em; opacity: 0.7; font-style: italic; font-family: var(--font-display); }
.price-cash {
  display: flex; align-items: baseline; justify-content: space-between;
  font-size: 0.95rem;
  color: rgba(246, 239, 228, .82);
}
.price-cash .v {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--cream-soft);
  font-feature-settings: "lnum";
}
.invest-incl {
  margin-top: 32px; padding-top: 24px;
  border-top: 1px solid rgba(246, 239, 228, .15);
  font-size: 0.92rem;
  color: rgba(246, 239, 228, .75);
}
.invest-incl ul { list-style: none; padding: 0; margin: 12px 0 0; display: grid; gap: 10px; }
.invest-incl li { display: grid; grid-template-columns: 18px 1fr; gap: 10px; align-items: start; line-height: 1.4; }
.invest-incl li::before {
  content: ""; display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold);
  margin-top: 7px;
}

/* ─── Footer urgency ─── */
.s-footer {
  background: var(--ink);
  color: var(--cream-soft);
  padding: clamp(56px, 8vh, 88px) 0 32px;
  text-align: center;
}
.urgency {
  display: inline-flex; align-items: center; gap: 14px;
  background: linear-gradient(180deg, rgba(184, 138, 62, .15), rgba(184, 138, 62, .05));
  border: 1px solid rgba(184, 138, 62, .4);
  padding: 14px 28px;
  border-radius: var(--r-pill);
  margin-bottom: 36px;
  font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}
.urgency .pulse {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.s-footer h2 {
  font-family: var(--font-display);
  font-style: italic;
  font-size: clamp(1.8rem, 3.6vw, 2.6rem);
  font-weight: 400;
  line-height: 1.15;
  max-width: 18ch;
  margin: 0 auto 32px;
  letter-spacing: -0.005em;
}
.s-footer .meta {
  margin-top: 56px;
  padding-top: 28px;
  border-top: 1px solid rgba(246, 239, 228, .1);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(246, 239, 228, .5);
}

/* ─── Responsive ─── */
@media (max-width: 880px) {
  .s-for-grid, .s-live-grid, .s-about-grid, .s-signup-grid, .s-space-head {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  .s-live-photo { aspect-ratio: 4/5; max-width: 480px; margin: 0 auto; }
  .s-about-photo { max-width: 480px; margin: 0 auto; aspect-ratio: 3/4; }
  .gallery {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 160px;
  }
  .gallery-item.lg, .gallery-item.md, .gallery-item.wide { grid-column: span 2; }
  .gallery-item.sm { grid-column: span 1; grid-row: span 1; }
  .space-stage { aspect-ratio: 4 / 5; max-height: 520px; }
  .space-arrow { width: 38px; height: 38px; }
  .space-arrow-prev { left: 12px; }
  .space-arrow-next { right: 12px; }
  .space-tag { left: 14px; bottom: 56px; font-size: 12px; }
  .space-counter { right: 14px; bottom: 56px; }
  .space-dots { bottom: 18px; }

  /* Testimonials — collapse the absolute-positioned stage so cards size to content */
  .testi-stage { min-height: 0; }
  .testi-stage-img {
    position: relative;
    height: auto;
    min-height: 0;
    max-width: 92vw;
    margin: 0 auto;
  }
  .testi-img-card {
    position: relative;
    inset: auto;
    display: none;
    transform: none;
    transition: opacity .4s ease;
  }
  .testi-img-card.active { display: flex; }
  .testi-img-frame { padding: 14px 12px 12px; max-width: 88vw; max-height: none; }
  .testi-img-frame img { max-height: 62vh; max-width: 100%; height: auto; width: auto; }
  .testi-controls { margin-top: 28px; padding-bottom: 0; }
  .s-testi-cta { margin-top: 36px; }

  .scroll-indicator { display: none; }
  .hero-meta { flex-direction: column; gap: 12px; }
  .s-about-stats { grid-template-columns: 1fr 1fr; }
  .hero-bg img { object-position: 65% center; }

  /* Sobre — tighten photo, give text breathing room */
  .s-about { padding-bottom: clamp(70px, 10vh, 110px); }
  .s-about-photo img { object-position: center 30%; }
  .s-about h2 { margin-top: 6px; }

  /* Inscrição — stack signup blocks, tighten heading */
  .signup-steps { padding: clamp(28px, 5vw, 40px) clamp(22px, 5vw, 32px); }
  .signup-steps h2 { font-size: clamp(1.6rem, 6vw, 2rem); }
  .invest { padding: clamp(28px, 5vw, 40px) clamp(22px, 5vw, 32px); }
  .invest h2 { font-size: clamp(1.4rem, 5.6vw, 1.85rem); line-height: 1.15; }
  .price-installment .num { font-size: clamp(2rem, 9vw, 2.6rem); }
  .price-cash .v { font-size: 1.2rem; }

  /* WhatsApp CTA — wraps text, allow vertical layout */
  .cta-whatsapp {
    white-space: normal;
    text-align: center;
    padding: 16px 22px;
    font-size: 11px;
    line-height: 1.3;
    letter-spacing: 0.14em;
    max-width: 100%;
  }
}
@media (max-width: 520px) {
  body { font-size: 16px; }
  .cta { padding: 16px 24px; font-size: 11px; }
  .s-for-list li { grid-template-columns: 40px 1fr; gap: 12px; padding: 18px 0; font-size: 1rem; }
  .s-about-photo { aspect-ratio: 1/1.1; max-width: 100%; }
  .s-about-stats { grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 28px; padding-top: 24px; }
  .s-about-stats .stat .num { font-size: 2rem; }

  /* Testimonials — keep image readable but cap by viewport */
  .testi-img-frame img { max-height: 60vh; }
  .s-testi-cta { margin-top: 28px; }

  /* Inscrição — even tighter on small phones */
  .invest h2 { font-size: clamp(1.3rem, 5.6vw, 1.65rem); }
  .price-installment .num { font-size: clamp(1.9rem, 8.4vw, 2.3rem); }
  .invest-incl li { font-size: 0.88rem; }
  .cta-whatsapp { padding: 14px 18px; font-size: 10.5px; letter-spacing: 0.12em; gap: 10px; }
  .cta-whatsapp .wa-icon svg { width: 18px; height: 18px; }
}

</style>
